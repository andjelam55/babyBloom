<!DOCTYPE html>
<html lang="en">

<head>
    <title>Baby Bloom</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Baby Bloom is an online shop for baby dresses, jackets and sets. Explore adorable baby clothes for every occasion.">
    <meta name="keywords" content="baby clothes, baby shop, baby dress, baby jacket, baby set, Baby Bloom">

    <link rel="apple-touch-icon" href="assets/img/apple-icon.png">
    <link rel="shortcut icon" type="image/x-icon" href="assets/img/favicon-b.png">

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/templatemo.css">
    <link rel="stylesheet" href="assets/css/custom.css">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap">
    <link rel="stylesheet" href="assets/css/fontawesome.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
</head>

<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-light shadow">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand text-success logo h1 align-self-center" href="index.html">Baby Bloom</a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#templatemo_main_nav" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="align-self-center collapse navbar-collapse flex-fill d-lg-flex justify-content-lg-between" id="templatemo_main_nav">
                
                <!-- Dynamic Menu -->

            </div>
            <div class="navbar align-self-center d-flex position-relative">
                <a class="nav-icon position-relative text-decoration-none me-3" href="card.html">
                    <i class="fa fa-fw fa-cart-arrow-down text-dark"></i>
                    <span id="cartCount" class="badge bg-success rounded-circle position-absolute top-0 start-100 translate-middle p-2">0</span>
                </a>
            </div>
        </div>
    </nav>
    <!-- Close Header -->

    <!-- Modal -->
    <section class="container py-5" id="contact">
    <div class="row">

        <!-- FORM -->
        <div class="col-md-6">
            <h2 class="mb-4 h2 text-center">Complete Your Order</h2>

            <form id="contactForm">

                <div class="mb-3">
                    <label for="full-name">Full Name:</label>
                    <input type="text" class="form-control" id="full-name" name="full-name" placeholder="Your name">
                    <span id="fullNameError" class="error-message"></span>
                </div>

                <div class="mb-3">
                    <label for="email">Email:</label>
                    <input type="text" class="form-control" id="email" name="email" placeholder="Your email">
                    <span id="emailError" class="error-message"></span>
                </div>

                <div class="mb-3">
                    <label for="choose">Choose delivery:</label>
                        <div id="selectChoose">
                        </div>
                    <span id="selectError" class="error-message"></span>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="terms" name="terms">
                    <label class="form-check-label" for="terms">I agree to the terms</label>
                    <span id="termsError" class="error-message d-block"></span>
                </div>

                <div class="mb-3">
                    <label for="message">Message:</label>
                    <textarea id="message" class="form-control" name="message" placeholder="Your Message" rows="4"></textarea>
                    <span id="messageError" class="error-message"></span>
                </div>

                <button type="submit" class="btn btn-success w-100" id="contact-btn">Place Order</button>
                <span id="success-message2" class="success-message"></span>

            </form>
            
        </div>

    </div>
    </section>


    <!-- Start Footer -->
    <footer class="bg-dark py-4" id="tempaltemo_footer">
    <div class="container">
        <div class="row align-items-center">
            <!-- Left: Contact -->
            <div class="col-md-6 mb-3 mb-md-0">
                <h5 class="text-success mb-2">Baby Bloom</h5>
                <ul class="list-unstyled text-light mb-0" style="line-height:1.6;">
                    <li><i class="fas fa-map-marker-alt fa-fw"></i> 123 Baby Street, 11000 Belgrade</li>
                    <li><i class="fa fa-phone fa-fw"></i> <a class="text-light text-decoration-none" href="tel:010-020-0340">010-020-0340</a></li>
                    <li><i class="fa fa-envelope fa-fw"></i> <a class="text-light text-decoration-none" href="mailto:info@babybloom.com">info@babybloom.com</a></li>
                </ul>
            </div>
            <!-- Right: Links -->
            <div class="col-md-6 text-md-end" id="link">

                <!-- Dynamic Menu -->

            </div>
        </div>
        <div class="row mt-3">
            <div class="col-12 text-center text-light">
                <p class="mb-0">&copy; <span id="year"></span> Baby Bloom | Designed by <a rel="sponsored" href="https://templatemo.com" target="_blank" class="text-light">TemplateMo</a></p>
            </div>
        </div>
    </div>
</footer>

    <!-- Scripts -->
    <script src="assets/js/jquery-1.11.0.min.js"></script>
    <script src="assets/js/jquery-migrate-1.2.1.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/templatemo.js"></script>
    <script src="assets/js/custom.js"></script>
    <script src="assets/js/main.js"></script>
    <!-- End Script -->

     <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

</body>
</html>
